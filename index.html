<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Table</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h2>Employee Table</h2>

    <a href="https://ibotskanmani.github.io/mergeconflict/" target="_blank">
    <button>Open Live Project</button></a>


    <div class="button-box">
        <button id="addBtn" onclick="addRow()">Add Row</button>
        <button id="saveBtn" onclick="saveData()">Save</button>
        <button id="refreshBtn" onclick="loadData()">Refresh</button>
    </div>

    <table id="employeeTable" border="2">

        <thead>

            <tr>

                <th>Serial No</th>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Designation</th>
                <th>Salary</th>
                <th>Action</th>

            </tr>

        </thead>

        <tbody id="tableBody">

            <tr>

                <td contenteditable="true">1</td>
                <td contenteditable="true"></td>
                <td contenteditable="true"></td>
                <td contenteditable="true"></td>
                <td contenteditable="true"></td>
                <td contenteditable="true"></td>
                <td>

                    <button class="deleteBtn"
                            onclick="deleteRow(this)">
                        Delete
                    </button>

                </td>

            </tr>

        </tbody>

    </table>

</div>

<script src="script.js"></script>

</body>
</html>
